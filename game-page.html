<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelo de Palavras</title>
    <link rel="shortcut icon" href="https://i.postimg.cc/4dhf2XcR/favicon.png" type="image/png">

    <!-- Bootstrap CSS (Bootstrap 3.0.4)-->
     <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
     <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
     <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <h4 id="player1-name"></h4>
    <span id="player1-score"></span>
    <br>

    <h4 id="player2-name"></h4>
    <span id="player2-score"></span>

    <br>

    <div class="container">
        <h2 style="color: rgb(56, 2, 2);">Duelo de Palavras! Adivinhe qual é a palavra. . .</h2>
        <h3 id="player-question"></h3>
        <h3 id="player-answer"></h3>
        <div id="output" class="col-lg-6"></div>
        <br><br>
        <div class="login-div">
            <label>"Sua Palavra: <strong style="color:red; font-weight:bolder">Use uma palavra com cinco ou mais letras</strong>"</label>
            <input type="text" id="word" class="form-control" placeholder="Insira sua palavra aqui">
            
        <br>
            <button class="btn btn-success" onclick="send()"> Enviar</button>
        </div>
    </div>
    <script src="game-page.js"></script>
</body>
</html>
